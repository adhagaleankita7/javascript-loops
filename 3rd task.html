<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let num = prompt("Enter a number:");
      let count = 0;

      for (let i = 1; i <= num; i++) {
        if (i % 2 === 0) {
          count++;
        }
      }

      console.log("Total even numbers between 1 and " + num + " = " + count);
    </script>
  </body>
</html>
